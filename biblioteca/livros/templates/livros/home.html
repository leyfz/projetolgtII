<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema de Livros</title>

<style>

body{
font-family: "Segoe UI", Arial, sans-serif;
background:#f5f7fa;
margin:0;
color:#333;
}

/* Header */

header{
background:#1e40af;
color:white;
padding:25px;
text-align:center;
font-size:26px;
font-weight:600;
}

/* Menu */

nav{
background:white;
padding:15px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

nav a{
margin:0 15px;
text-decoration:none;
color:#1e40af;
font-weight:500;
font-size:16px;
transition:0.3s;
}

nav a:hover{
color:#2563eb;
}

/* Conteúdo */

.container{
max-width:800px;
margin:60px auto;
text-align:center;
padding:20px;
}

.container h2{
font-size:32px;
margin-bottom:10px;
color:#1e40af;
}

.container p{
font-size:18px;
color:#555;
}

/* Botões */

.botoes{
margin-top:30px;
}

.btn{
display:inline-block;
padding:12px 22px;
margin:10px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;
font-size:16px;
transition:0.3s;
}

.btn:hover{
background:#1e40af;
}

/* Footer */

footer{
text-align:center;
margin-top:80px;
padding:20px;
font-size:14px;
color:#777;
}

</style>

<body>

<h1>Sistema de Cadastro de Livros</h1>

<nav>
<a href="/">Home</a> |
<a href="/cadastrar/">Cadastrar Livro</a> |
<a href="/consultar/">Consultar Livro</a> |
<a href="/livros/">Listar Livros</a> |
<a href="/sobre/">Sobre</a> |
<a href="/contato/">Contato</a>
</nav>

<hr>

<h2>Bem-vindo!</h2>
<p>Este sistema permite cadastrar e consultar livros.</p>

</body>
</html>
