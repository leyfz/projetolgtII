{% extends 'livros/base.html' %}

{% block content %}

<h2>Cadastrar Livro</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="titulo" placeholder="Título"><br><br>
<input type="text" name="autor" placeholder="Autor"><br><br>
<input type="text" name="editora" placeholder="Editora"><br><br>
<input type="number" name="ano" placeholder="Ano"><br><br>
<input type="number" name="paginas" placeholder="Páginas"><br><br>
<input type="text" name="categoria" placeholder="Categoria"><br><br>
<input type="text" name="isbn" placeholder="ISBN"><br><br>
<input type="text" name="idioma" placeholder="Idioma"><br><br>

<textarea name="descricao" placeholder="Descrição"></textarea><br><br>

<input type="text" name="cadastrado_por" placeholder="Seu nome"><br><br>

<button type="submit">Cadastrar</button>

</form>

{% endblock %}
